name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: official-release
            sdk-channel: release
            sdk-index-url: https://update.flipperzero.one/firmware/directory.json
          - name: official-dev
            sdk-channel: dev
            sdk-index-url: https://update.flipperzero.one/firmware/directory.json
          - name: unleashed
            sdk-channel: release
            sdk-index-url: https://up.unleashedflip.com/directory.json
          - name: momentum
            sdk-channel: release
            sdk-index-url: https://up.momentum-fw.dev/firmware/directory.json
    name: Build (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4

      - name: Build with ufbt
        uses: flipperdevices/flipperzero-ufbt-action@v0.1
        with:
          sdk-channel: ${{ matrix.sdk-channel }}
          sdk-index-url: ${{ matrix.sdk-index-url }}

      - name: Rename fap for this target
        run: cp dist/walkie_talkie.fap walkie_talkie-${{ matrix.name }}.fap

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: walkie_talkie-${{ matrix.name }}
          path: walkie_talkie-${{ matrix.name }}.fap

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release with faps attached
        uses: softprops/action-gh-release@v2
        with:
          files: walkie_talkie-*.fap
          generate_release_notes: true
